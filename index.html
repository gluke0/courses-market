<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <title>Fastler</title>
</head>

<body>

    <nav>
        <div class="left">
            <div class="logo">
                <img src="assets/logo.png" alt="Logo">
            </div>
            <div class="links">
                <a href="#">Home</a>
                <a href="#">Courses</a>
                <a href="#">Articles</a>
                <a href="#">About Us</a>
                <a href="#">Contact Us</a>
            </div>
        </div>

        <div class="buttons">
            <a href="#"><i class='bx bx-support'></i></a>
            <a href="#"><i class='bx bx-basket'></i></a>
            <a href="#"><i class='bx bx-user'></i></a>
        </div>
    </nav>

    <header>
        <div class="info">
            <h1>Learn Anything!</h1>
            <p>Coaches And Mentors Are Ready To Help! </p>
        </div>
        <div class="buttons">
            <button class="see-all">See Courses</button>
            <button>What do you want to learn?</button>
        </div>
        <div class="search">
            <input type="text" placeholder="Search what you want...">
            <button><i class='bx bx-search'></i></button>
        </div>
    </header>

    <div class="content">
        <div class="separator">
            <h2>Popular Courses</h2>
            <a href="#">See all <i class='bx bx-chevron-right'></i></a>
        </div>

        <div class="courses">
            <div class="item">
                <div class="top">
                    <img src="assests/coursea1.jpg" alt="Final Cut Curse">
                    <div class="info">
                        <a href="#">Final Cut X</a>
                        <p>Author : John Misky</p>
                        <p>Duration : +15h</p>
                        <p>Lifetime Support</p>
                    </div>
                </div>
                <div class="bottom">
                    <div class="price">
                        <h5>Price : 120$</h5>
                    </div>
                    <h5 class="tag"><span>+440</span> Students</h5>
                </div>
            </div>
            
        </div>
    
    
</body>
</html>
